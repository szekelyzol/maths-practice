<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matematikafeladatok</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <!-- ── BEÁLLÍTÁSOK ──────────────────────────────────────────── -->
  <div id="view-setup" class="view active">
    <div class="card setup-card">
      <h1>Matematikafeladatok</h1>

      <div class="field-group">
        <label class="field-label">Számtartomány</label>
        <div class="inline-inputs">
          <input type="number" id="min-number" value="0" min="0" max="9999">
          <span class="sep">–</span>
          <input type="number" id="max-number" value="70" min="1" max="9999">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Szorzótábla – legfeljebb</label>
        <div class="inline-inputs">
          <input type="number" id="times-table-max" value="10" min="1" max="30">
          <span class="sep-note">(× művelethez)</span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Feladatok száma</label>
        <input type="number" id="num-problems" value="10" min="1" max="100">
      </div>

      <div class="field-group">
        <label class="field-label">Műveletek</label>
        <div class="op-toggles">
          <label class="op-toggle op-add">
            <input type="checkbox" id="op-add" checked>
            <span>+ Összeadás</span>
          </label>
          <label class="op-toggle op-sub">
            <input type="checkbox" id="op-sub" checked>
            <span>− Kivonás</span>
          </label>
          <label class="op-toggle op-mul">
            <input type="checkbox" id="op-mul">
            <span>× Szorzás</span>
          </label>
          <label class="op-toggle op-div">
            <input type="checkbox" id="op-div">
            <span>÷ Osztás</span>
          </label>
          <label class="op-toggle op-rel">
            <input type="checkbox" id="op-rel">
            <span>⚖ Reláció</span>
          </label>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Óra</label>
        <div class="op-toggles">
          <label class="op-toggle op-clk-read">
            <input type="checkbox" id="op-clk-read">
            <span>🕐 Óra olvasás</span>
          </label>
          <label class="op-toggle op-clk-set">
            <input type="checkbox" id="op-clk-set">
            <span>🕐 Óra beállítás</span>
          </label>
          <label class="op-toggle op-clk-text">
            <input type="checkbox" id="op-clk-text">
            <span>🕐 Óra szöveg</span>
          </label>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Negatív eredmény</label>
        <label class="radio-opt">
          <input type="checkbox" id="allow-negative" checked>
          <span>Megengedett</span>
        </label>
      </div>

      <div class="field-group">
        <label class="field-label">Tagok száma feladatonként</label>
        <div class="radio-group">
          <label class="radio-opt">
            <input type="radio" name="max-clauses" value="2" checked>
            <span>Csak 2&nbsp; <em>pl. 5 + 3</em></span>
          </label>
          <label class="radio-opt">
            <input type="radio" name="max-clauses" value="3">
            <span>2 vagy 3&nbsp; <em>pl. 32 − 3 × 2</em></span>
          </label>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-start" id="start-btn">Indítás!</button>
      </div>
    </div>
  </div>

  <!-- ── GYAKORLÁS ────────────────────────────────────────────── -->
  <div id="view-practice" class="view">
    <div class="card problem-card" id="problem-card">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-label" id="prog-label">1 / 10</div>

      <!-- Számolás -->
      <div id="math-mode">
        <div class="problem-display">
          <span id="problem-expr"></span>
          <span class="equals"> = </span>
          <span class="qmark">?</span>
        </div>
      </div>

      <!-- Reláció -->
      <div id="rel-mode" class="hidden">
        <div class="problem-display">
          <span id="rel-expr"></span><span class="rel-qmark"> ? </span><span id="rel-right"></span>
        </div>
      </div>

      <!-- Óra -->
      <div id="clock-mode" class="hidden">
        <p class="clock-prompt" id="clock-prompt"></p>
        <div class="clock-text-desc hidden" id="clock-text-desc"></div>
        <svg id="clock-svg" viewBox="-110 -110 220 220" class="clock-face"></svg>
        <p class="clock-step-hint" id="clock-step-hint"></p>
        <div id="clock-disambig" class="clock-disambig hidden">
          <span>Melyik mutatót?</span>
          <button class="btn btn-sm btn-ghost" id="disambig-hour-btn">Óramutató</button>
          <button class="btn btn-sm btn-ghost" id="disambig-min-btn">Percmutató</button>
        </div>
        <div id="clock-actions" class="clock-actions hidden">
          <button class="btn btn-ghost" id="clock-next-btn">Következő →</button>
          <button class="btn btn-start hidden" id="clock-confirm-btn">Kész ✓</button>
        </div>
      </div>

      <!-- Próbák (közös) -->
      <div class="tries-row" id="tries-row">
        <div class="try-dot" id="dot-0"></div>
        <div class="try-dot" id="dot-1"></div>
      </div>

      <!-- Óra olvasás – válasz -->
      <div id="clock-answer" class="clock-answer-row hidden">
        <div class="time-inputs">
          <div class="time-input-group">
            <label class="time-label">Délelőtt</label>
            <input type="text" id="am-input" placeholder="8:16" autocomplete="off" inputmode="numeric">
          </div>
          <div class="time-input-group">
            <label class="time-label">Délután</label>
            <input type="text" id="pm-input" placeholder="20:16" autocomplete="off" inputmode="numeric">
          </div>
        </div>
        <button class="btn btn-check" id="clock-check-btn">Ellenőrzés ✓</button>
      </div>

      <!-- Reláció – válasz -->
      <div id="rel-answer" class="hidden">
        <div class="rel-buttons">
          <button class="rel-btn" id="rel-btn-lt">&lt;</button>
          <button class="rel-btn" id="rel-btn-eq">=</button>
          <button class="rel-btn" id="rel-btn-gt">&gt;</button>
        </div>
      </div>

      <!-- Számolás – válasz -->
      <div id="math-answer" class="answer-row">
        <div class="answer-inputs">
          <input type="number" id="answer-input" placeholder="?" autocomplete="off">
          <div id="remainder-group" class="remainder-group hidden">
            <label class="rem-label">Maradék</label>
            <input type="number" id="remainder-input" placeholder="0" min="0" autocomplete="off">
          </div>
        </div>
        <button class="btn btn-check" id="check-btn">Ellenőrzés ✓</button>
      </div>

      <div class="feedback-msg" id="feedback-msg"></div>
    </div>
  </div>

  <!-- ── ÖSSZEGZÉS ─────────────────────────────────────────────── -->
  <div id="view-summary" class="view">
    <div class="card summary-card">
      <h2 id="summary-title">Kör vége!</h2>
      <div class="summary-boxes" id="summary-boxes"></div>
      <div class="summary-table-wrap" id="summary-table-wrap"></div>
      <div class="btn-row">
        <button class="btn btn-start" id="new-session-btn">Új kör</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
